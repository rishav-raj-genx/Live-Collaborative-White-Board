<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collaborative Paint Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="title-block">
        <h1>Collaborative Paint Studio</h1>
        <p>Create, draw, and collaborate in real time.</p>
      </div>

      <div class="tool-group">
        <button class="tool-btn active" data-tool="pencil">✏ Pencil</button>
        <button class="tool-btn" data-tool="eraser">🧽 Eraser</button>
        <button class="tool-btn" data-tool="line">📏 Line</button>
        <button class="tool-btn" data-tool="rect">▭ Rectangle</button>
        <button class="tool-btn" data-tool="circle">◯ Circle</button>
        <button class="tool-btn" data-tool="text">📝 Text</button>
      </div>
    </div>

    <div class="controls">
      <div class="control-card">
        <label>Color</label>
        <input type="color" id="color" value="#111827" />
      </div>

      <div class="control-card">
        <label>Size</label>
        <input type="range" id="size" min="1" max="30" value="4" />
      </div>

      <div class="control-card">
        <label>Fill Color</label>
        <input type="color" id="fillColor" value="#3b82f6" />
      </div>

      <div class="control-card">
        <label><input type="checkbox" id="fillShapes" /> Fill Shapes</label>
      </div>

      <div class="control-card">
        <label>Bg Color</label>
        <input type="color" id="backgroundColor" value="#ffffff" />
      </div>
    </div>

    <div class="action-bar">
      <button id="undoBtn">↶ Undo</button>
      <button id="redoBtn">↷ Redo</button>
      <button id="clearBtn">🧹 Clear</button>
      <button id="addStageBtn">➕ Add Page</button>
      <button id="prevStageBtn">◀ Prev</button>
      <span id="pageLabel">Page 1 / 1</span>
      <button id="nextStageBtn">Next ▶</button>
      <button id="deleteStageBtn">🗑 Delete</button>
      <button id="downloadBtn">⬇ Download</button>
    </div>

    <div class="board-wrapper">
      <canvas id="board" width="1600" height="900"></canvas>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
